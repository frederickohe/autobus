services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: autobusadmin
      POSTGRES_PASSWORD: autobus098
      POSTGRES_DB: autobus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: autobusredis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass autobus098
    environment:
      REDIS_PASSWORD: autobus098
    volumes:
      - redis_data:/data

  backend:
    build: .
    command: python src/main.py
    volumes:
      - .:/app
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://autobusadmin:autobus098@db:5432/autobus
      REDIS_HOST: redis-1
      REDIS_PORT: 6379
      JWT_SECRET_KEY: green-secret-keeps-gamma
      JWT_ALGORITHM: HS256
      DEBUG: true
      DB_ECHO: true
      DB_HOST: ent_core_user_db
      DB_PORT: 5432
      DB_USER: user_admin
      DB_PASSWORD: changeme321
      DB_DATABASE: ent_core_db
      MULTI_TENANT: false
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

volumes:
  redis_data:
  postgres_data:
